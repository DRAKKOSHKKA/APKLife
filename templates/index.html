{% extends "base.html" %}
{% block header %}
<h4 class="m-0">📅 Расписание APKLife</h4>
{% endblock %}

{% block content %}
<div class="card shadow-sm search-card">
	<div class="card-body">
		<h5 class="card-title">Введите группу, преподавателя или аудиторию</h5>
		<form id="searchForm" method="get" action="/group/">
			<div class="mb-3 position-relative">
				<input
					type="text"
					class="form-control"
					id="group-input"
					name="group_name"
					placeholder="11 нмо, Климова Т.С., актовый зал"
					autocomplete="on"
				/>
				<div id="suggestions-container" class="list-group position-absolute w-100"></div>
				<input type="hidden" name="week_id" value="{{ current_week }}" />
				<input type="hidden" name="day" value="{{ current_day_name }}" />
			</div>
			<button type="submit" class="btn btn-primary w-100">Найти расписание</button>
		</form>
	</div>
</div>
{% endblock %}
